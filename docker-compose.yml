services:

  # ── Infrastructure ──────────────────────────────────────────────────

  zookeeper:
    image: zookeeper:3.9
    ports:
      - "2181:2181"
    networks:
      - google-maps-net

  zoonavigator:
    image: elkozmon/zoonavigator
    ports:
      - "9000:9000"
    depends_on:
      - zookeeper
    environment:
      HTTP_PORT: 9000
      AUTO_CONNECT_CONNECTION_STRING: zookeeper:2181
    networks:
      - google-maps-net

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster'"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - cassandra-data:/var/lib/cassandra
    networks:
      - google-maps-net

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init/cassandra/init.cql:/init.cql
    command: cqlsh cassandra -f /init.cql
    restart: "no"
    networks:
      - google-maps-net

  postgresql:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: google_maps
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./init/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    networks:
      - google-maps-net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      location-service-1:
        condition: service_healthy
      location-service-2:
        condition: service_healthy
      navigation-service-1:
        condition: service_healthy
      navigation-service-2:
        condition: service_healthy
      geocoding-service-1:
        condition: service_healthy
      geocoding-service-2:
        condition: service_healthy
      route-planner-service-1:
        condition: service_healthy
      route-planner-service-2:
        condition: service_healthy
      shortest-path-service-1:
        condition: service_healthy
      shortest-path-service-2:
        condition: service_healthy
      eta-service-1:
        condition: service_healthy
      eta-service-2:
        condition: service_healthy
      ranker-service-1:
        condition: service_healthy
      ranker-service-2:
        condition: service_healthy
      map-tile-service-1:
        condition: service_healthy
      map-tile-service-2:
        condition: service_healthy
    networks:
      - google-maps-net

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - google-maps-net

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - google-maps-net

  # ── Location Service ────────────────────────────────────────────────

  location-service-1:
    build:
      context: .
      args:
        SERVICE_NAME: location-service
    environment:
      SERVER_PORT: 8081
    depends_on:
      zookeeper:
        condition: service_started
      cassandra:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - google-maps-net

  location-service-2:
    build:
      context: .
      args:
        SERVICE_NAME: location-service
    environment:
      SERVER_PORT: 8081
    depends_on:
      zookeeper:
