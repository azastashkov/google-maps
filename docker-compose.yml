  # ── Load Client ─────────────────────────────────────────────────────

  load-client:
    profiles:
      - test
    build:
      context: .
      args:
        SERVICE_NAME: load-client
    environment:
      LOAD_TEST_DURATION_SECONDS: ${LOAD_TEST_DURATION_SECONDS:-60}
      TARGET_BASE_URL: http://nginx:80
    depends_on:
      - nginx
    networks:
      - google-maps-net

networks:
  google-maps-net:
    driver: bridge

volumes:
  cassandra-data:
  postgres-data:
