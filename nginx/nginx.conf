events {
    worker_connections 1024;
}

http {
    upstream location-service {
        server location-service-1:8081;
        server location-service-2:8081;
    }

    upstream navigation-service {
        server navigation-service-1:8082;
        server navigation-service-2:8082;
    }

    upstream geocoding-service {
        server geocoding-service-1:8083;
        server geocoding-service-2:8083;
    }

    upstream route-planner-service {
        server route-planner-service-1:8084;
        server route-planner-service-2:8084;
    }

    upstream shortest-path-service {
        server shortest-path-service-1:8085;
        server shortest-path-service-2:8085;
    }

    upstream eta-service {
        server eta-service-1:8086;
        server eta-service-2:8086;
    }

    upstream ranker-service {
        server ranker-service-1:8087;
        server ranker-service-2:8087;
    }

    upstream map-tile-service {
        server map-tile-service-1:8088;
        server map-tile-service-2:8088;
    }

    server {
        listen 80;

        location /api/locations {
            proxy_pass http://location-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/navigation {
            proxy_pass http://navigation-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/geocode {
            proxy_pass http://geocoding-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/routes {
            proxy_pass http://route-planner-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/shortest-path {
            proxy_pass http://shortest-path-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/eta {
            proxy_pass http://eta-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/rank {
            proxy_pass http://ranker-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/tiles {
            proxy_pass http://map-tile-service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
